<!-- 暴躁二哈 - 温暖萌宠风格 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- 背景 -->
  <rect width="200" height="280" fill="#E8F4F8" rx="12"/>

  <!-- 装饰元素 -->
  <circle cx="40" cy="35" r="4" fill="#B8D8E8" opacity="0.5"/>
  <circle cx="160" cy="45" r="5" fill="#B8D8E8" opacity="0.5"/>

  <!-- 二哈身体 -->
  <ellipse cx="100" cy="185" rx="55" ry="50" fill="#708090"/>

  <!-- 白色肚子 -->
  <ellipse cx="100" cy="190" rx="35" ry="40" fill="#FFFFFF"/>

  <!-- 二哈头部 -->
  <ellipse cx="100" cy="120" rx="48" ry="45" fill="#708090"/>

  <!-- 白色面部 -->
  <path d="M 75 110 Q 100 140 125 110 Q 100 130 75 110" fill="#FFFFFF"/>

  <!-- 左耳（尖耳朵） -->
  <path d="M 65 85 L 55 50 L 75 80 Z" fill="#708090"/>
  <path d="M 65 85 L 60 60 L 72 82 Z" fill="#505050"/>

  <!-- 右耳（尖耳朵） -->
  <path d="M 135 85 L 145 50 L 125 80 Z" fill="#708090"/>
  <path d="M 135 85 L 140 60 L 128 82 Z" fill="#505050"/>

  <!-- 面具标记（二哈特征） -->
  <ellipse cx="75" cy="105" rx="20" ry="25" fill="#505050" opacity="0.7"/>
  <ellipse cx="125" cy="105" rx="20" ry="25" fill="#505050" opacity="0.7"/>

  <!-- 左眼（蓝色异瞳） -->
  <circle cx="80" cy="110" r="9" fill="#4A90E2"/>
  <circle cx="82" cy="108" r="3" fill="#FFFFFF"/>

  <!-- 右眼（蓝色异瞳） -->
  <circle cx="120" cy="110" r="9" fill="#4A90E2"/>
  <circle cx="122" cy="108" r="3" fill="#FFFFFF"/>

  <!-- 鼻子 -->
  <ellipse cx="100" cy="130" rx="7" ry="6" fill="#2C1810"/>

  <!-- 嘴巴（调皮表情） -->
  <path d="M 85 138 Q 95 145 105 138" stroke="#2C1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 105 138 Q 110 142 115 138" stroke="#2C1810" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- 舌头 -->
  <ellipse cx="110" cy="148" rx="8" ry="12" fill="#FF6B9D"/>

  <!-- 小短腿 -->
  <rect x="65" y="215" width="14" height="35" rx="7" fill="#708090"/>
  <rect x="121" y="215" width="14" height="35" rx="7" fill="#708090"/>

  <!-- 白色爪子 -->
  <ellipse cx="72" cy="248" rx="9" ry="6" fill="#FFFFFF"/>
  <ellipse cx="128" cy="248" rx="9" ry="6" fill="#FFFFFF"/>

  <!-- 尾巴（卷曲） -->
  <path d="M 145 180 Q 165 170 170 190 Q 165 200 155 195" fill="#708090" stroke="#505050" stroke-width="2"/>

  <!-- 闪电装饰（表示暴躁） -->
  <path d="M 170 70 L 165 85 L 172 85 L 167 100 L 180 82 L 173 82 Z" fill="#FFD700" opacity="0.8"/>
</svg>
