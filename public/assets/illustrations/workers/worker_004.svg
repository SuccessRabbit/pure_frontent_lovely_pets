<!-- 算账小仓鼠 - 角色插画（4:3比例） -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#FFFACD"/>

  <!-- 金币装饰 -->
  <circle cx="80" cy="70" r="13" fill="#FFD700" opacity="0.7"/>
  <text x="80" y="76" font-family="Arial" font-size="16" fill="#8B7355" text-anchor="middle">¥</text>
  <circle cx="320" cy="75" r="11" fill="#FFD700" opacity="0.7"/>
  <text x="320" y="81" font-family="Arial" font-size="14" fill="#8B7355" text-anchor="middle">$</text>

  <!-- 仓鼠身体 -->
  <ellipse cx="200" cy="215" rx="90" ry="82" fill="#F4A460"/>

  <!-- 仓鼠头部 -->
  <circle cx="200" cy="140" r="73" fill="#F4A460"/>

  <!-- 白色肚子 -->
  <ellipse cx="200" cy="220" rx="62" ry="68" fill="#FFF8DC"/>

  <!-- 左耳 -->
  <circle cx="150" cy="95" r="19" fill="#D2691E"/>
  <circle cx="150" cy="95" r="13" fill="#FFB6C1"/>

  <!-- 右耳 -->
  <circle cx="250" cy="95" r="19" fill="#D2691E"/>
  <circle cx="250" cy="95" r="13" fill="#FFB6C1"/>

  <!-- 眼睛（精明的眼神） -->
  <circle cx="175" cy="135" r="15" fill="#2C1810"/>
  <circle cx="178" cy="132" r="5" fill="#FFFFFF"/>

  <circle cx="225" cy="135" r="15" fill="#2C1810"/>
  <circle cx="228" cy="132" r="5" fill="#FFFFFF"/>

  <!-- 眼镜 -->
  <circle cx="175" cy="135" r="21" fill="none" stroke="#8B7355" stroke-width="3"/>
  <circle cx="225" cy="135" r="21" fill="none" stroke="#8B7355" stroke-width="3"/>
  <line x1="196" y1="135" x2="204" y2="135" stroke="#8B7355" stroke-width="3"/>

  <!-- 鼻子 -->
  <ellipse cx="200" cy="155" rx="6" ry="5" fill="#D2691E"/>

  <!-- 嘴巴 -->
  <path d="M 185 168 Q 200 175 215 168" stroke="#2C1810" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 腮红 -->
  <ellipse cx="140" cy="150" rx="19" ry="13" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="260" cy="150" rx="19" ry="13" fill="#FFB6C1" opacity="0.6"/>

  <!-- 计算器装饰 -->
  <rect x="155" y="180" width="90" height="70" rx="5" fill="#2C3E50"/>
  <rect x="160" y="185" width="80" height="28" rx="2" fill="#34495E"/>
  <text x="200" y="203" font-family="monospace" font-size="16" fill="#00FF00" text-anchor="middle">888.88</text>

  <!-- 计算器按钮 -->
  <rect x="165" y="220" width="14" height="11" rx="2" fill="#7F8C8D"/>
  <rect x="183" y="220" width="14" height="11" rx="2" fill="#7F8C8D"/>
  <rect x="201" y="220" width="14" height="11" rx="2" fill="#7F8C8D"/>
  <rect x="219" y="220" width="14" height="11" rx="2" fill="#7F8C8D"/>
  <rect x="165" y="235" width="14" height="11" rx="2" fill="#7F8C8D"/>
  <rect x="183" y="235" width="14" height="11" rx="2" fill="#7F8C8D"/>
  <rect x="201" y="235" width="14" height="11" rx="2" fill="#7F8C8D"/>
  <rect x="219" y="235" width="14" height="11" rx="2" fill="#FFD700"/>

  <!-- 金币堆 -->
  <circle cx="290" cy="240" r="10" fill="#FFD700"/>
  <circle cx="280" cy="248" r="8" fill="#FFD700"/>
  <circle cx="300" cy="248" r="8" fill="#FFD700"/>
</svg>
