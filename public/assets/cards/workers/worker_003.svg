<!-- 卷王 - 温暖萌宠风格 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- 背景 -->
  <rect width="200" height="280" fill="#FFF8DC" rx="12"/>

  <!-- 火焰装饰（内卷之火） -->
  <path d="M 30 50 Q 35 40 40 50 Q 38 45 40 40" fill="#FF6347" opacity="0.6"/>
  <path d="M 160 55 Q 165 45 170 55 Q 168 50 170 45" fill="#FF6347" opacity="0.6"/>

  <!-- 马身体 -->
  <ellipse cx="100" cy="180" rx="52" ry="48" fill="#8B4513"/>

  <!-- 马头部 -->
  <ellipse cx="100" cy="120" rx="42" ry="38" fill="#8B4513"/>

  <!-- 白色胸毛 -->
  <ellipse cx="100" cy="165" rx="30" ry="25" fill="#F5DEB3"/>

  <!-- 左耳 -->
  <ellipse cx="75" cy="95" rx="11" ry="20" fill="#A0522D" transform="rotate(-15 75 95)"/>

  <!-- 右耳 -->
  <ellipse cx="125" cy="95" rx="11" ry="20" fill="#A0522D" transform="rotate(15 125 95)"/>

  <!-- 眼睛（锐利的眼神） -->
  <ellipse cx="85" cy="115" rx="10" ry="12" fill="#2C1810"/>
  <ellipse cx="85" cy="115" rx="6" ry="8" fill="#FF4500"/>
  <circle cx="87" cy="113" r="2" fill="#FFFFFF"/>

  <ellipse cx="115" cy="115" rx="10" ry="12" fill="#2C1810"/>
  <ellipse cx="115" cy="115" rx="6" ry="8" fill="#FF4500"/>
  <circle cx="117" cy="113" r="2" fill="#FFFFFF"/>

  <!-- 眉毛（严肃） -->
  <path d="M 75 105 L 90 103" stroke="#2C1810" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 110 103 L 125 105" stroke="#2C1810" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 鼻子 -->
  <ellipse cx="100" cy="132" rx="6" ry="5" fill="#A0522D"/>

  <!-- 嘴巴（紧绷的表情） -->
  <path d="M 88 140 L 112 140" stroke="#2C1810" stroke-width="2" stroke-linecap="round"/>

  <!-- 小短腿 -->
  <rect x="70" y="218" width="14" height="30" rx="7" fill="#8B4513"/>
  <rect x="116" y="218" width="14" height="30" rx="7" fill="#8B4513"/>

  <!-- 蹄子 -->
  <rect x="68" y="244" width="18" height="8" rx="2" fill="#A0522D"/>
  <rect x="114" y="244" width="18" height="8" rx="2" fill="#A0522D"/>

  <!-- 尾巴（紧张地甩动） -->
  <path d="M 142 175 Q 165 170 175 185 Q 170 190 165 185" fill="#8B4513" stroke="#A0522D" stroke-width="2"/>

  <!-- 笔记本电脑装饰 -->
  <rect x="75" y="150" width="50" height="35" rx="2" fill="#2C3E50"/>
  <rect x="78" y="153" width="44" height="25" rx="1" fill="#34495E"/>
  <line x1="78" y1="165" x2="122" y2="165" stroke="#00FF00" stroke-width="1"/>
  <line x1="78" y1="170" x2="115" y2="170" stroke="#00FF00" stroke-width="1"/>

  <!-- 咖啡杯装饰 -->
  <g transform="translate(140, 140) scale(0.7)">
    <rect x="5" y="10" width="20" height="25" rx="2" fill="#8B4513"/>
    <ellipse cx="15" cy="10" rx="10" ry="3" fill="#6F4E37"/>
    <path d="M 25 18 Q 32 18 32 25 Q 32 32 25 32" stroke="#8B4513" stroke-width="2" fill="none"/>
  </g>

  <!-- 汗滴（压力大） -->
  <ellipse cx="68" cy="108" rx="4" ry="7" fill="#87CEEB" opacity="0.7"/>
  <ellipse cx="132" cy="108" rx="4" ry="7" fill="#87CEEB" opacity="0.7"/>

  <!-- 闪电符号（高强度） -->
  <path d="M 165 100 L 160 115 L 167 115 L 162 130 L 175 112 L 168 112 Z" fill="#FFD700" opacity="0.8"/>
</svg>
