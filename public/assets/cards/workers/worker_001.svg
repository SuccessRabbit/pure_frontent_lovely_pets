<!-- 实习牛马 - 温暖萌宠风格 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- 背景 -->
  <rect width="200" height="280" fill="#F5F5F5" rx="12"/>

  <!-- 装饰元素 -->
  <circle cx="40" cy="40" r="3" fill="#D3D3D3" opacity="0.5"/>
  <circle cx="160" cy="35" r="4" fill="#D3D3D3" opacity="0.5"/>

  <!-- 小马身体 -->
  <ellipse cx="100" cy="175" rx="48" ry="42" fill="#A9A9A9"/>

  <!-- 小马头部 -->
  <ellipse cx="100" cy="120" rx="38" ry="35" fill="#A9A9A9"/>

  <!-- 白色肚子 -->
  <ellipse cx="100" cy="180" rx="30" ry="35" fill="#E8E8E8"/>

  <!-- 左耳 -->
  <ellipse cx="75" cy="95" rx="10" ry="18" fill="#808080" transform="rotate(-15 75 95)"/>

  <!-- 右耳 -->
  <ellipse cx="125" cy="95" rx="10" ry="18" fill="#808080" transform="rotate(15 125 95)"/>

  <!-- 眼睛（疲惫的眼神） -->
  <ellipse cx="85" cy="115" rx="8" ry="10" fill="#2C1810"/>
  <circle cx="86" cy="114" r="2" fill="#FFFFFF"/>

  <ellipse cx="115" cy="115" rx="8" ry="10" fill="#2C1810"/>
  <circle cx="116" cy="114" r="2" fill="#FFFFFF"/>

  <!-- 黑眼圈 -->
  <ellipse cx="85" cy="122" rx="10" ry="4" fill="#696969" opacity="0.4"/>
  <ellipse cx="115" cy="122" rx="10" ry="4" fill="#696969" opacity="0.4"/>

  <!-- 鼻子 -->
  <ellipse cx="100" cy="130" rx="5" ry="4" fill="#696969"/>

  <!-- 嘴巴（无奈的表情） -->
  <path d="M 90 138 Q 100 136 110 138" stroke="#2C1810" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 小短腿 -->
  <rect x="72" y="210" width="12" height="32" rx="6" fill="#A9A9A9"/>
  <rect x="116" y="210" width="12" height="32" rx="6" fill="#A9A9A9"/>

  <!-- 蹄子 -->
  <rect x="70" y="238" width="16" height="8" rx="2" fill="#696969"/>
  <rect x="114" y="238" width="16" height="8" rx="2" fill="#696969"/>

  <!-- 尾巴 -->
  <path d="M 140 170 Q 155 175 160 190" stroke="#808080" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 工牌装饰 -->
  <rect x="85" y="155" width="30" height="20" rx="2" fill="#FFFFFF" stroke="#696969" stroke-width="1"/>
  <text x="100" y="169" font-family="Arial" font-size="10" fill="#696969" text-anchor="middle">实习</text>

  <!-- 汗滴 -->
  <ellipse cx="70" cy="110" rx="4" ry="6" fill="#87CEEB" opacity="0.6"/>
  <ellipse cx="130" cy="108" rx="3" ry="5" fill="#87CEEB" opacity="0.6"/>
</svg>
