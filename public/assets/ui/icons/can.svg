<!-- 小罐头图标 - 温暖萌宠风格 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 罐头主体 -->
  <ellipse cx="32" cy="50" rx="20" ry="8" fill="#C0C0C0"/>
  <rect x="12" y="20" width="40" height="30" fill="#E8E8E8"/>
  <ellipse cx="32" cy="20" rx="20" ry="8" fill="#F5F5F5"/>

  <!-- 罐头顶部 -->
  <ellipse cx="32" cy="20" rx="18" ry="6" fill="#FFD700"/>

  <!-- 标签 -->
  <rect x="15" y="28" width="34" height="18" rx="2" fill="#FF6B9D"/>

  <!-- 文字 -->
  <text x="32" y="40" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">罐头</text>

  <!-- 高光 -->
  <ellipse cx="22" cy="25" rx="3" ry="8" fill="#FFFFFF" opacity="0.4"/>

  <!-- 阴影 -->
  <ellipse cx="32" cy="50" rx="20" ry="8" fill="#000000" opacity="0.2"/>
</svg>
