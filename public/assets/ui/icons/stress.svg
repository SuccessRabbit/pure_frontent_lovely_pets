<!-- 压力图标 - 温暖萌宠风格 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 温度计主体 -->
  <rect x="26" y="12" width="12" height="36" rx="6" fill="#E8E8E8"/>

  <!-- 温度计底部（圆球） -->
  <circle cx="32" cy="52" r="10" fill="#FF6347"/>

  <!-- 刻度 -->
  <line x1="38" y1="18" x2="42" y2="18" stroke="#808080" stroke-width="2"/>
  <line x1="38" y1="24" x2="42" y2="24" stroke="#808080" stroke-width="2"/>
  <line x1="38" y1="30" x2="42" y2="30" stroke="#808080" stroke-width="2"/>
  <line x1="38" y1="36" x2="42" y2="36" stroke="#808080" stroke-width="2"/>
  <line x1="38" y1="42" x2="42" y2="42" stroke="#808080" stroke-width="2"/>

  <!-- 水银柱 -->
  <rect x="29" y="20" width="6" height="28" rx="3" fill="#FF6347"/>

  <!-- 高光 -->
  <ellipse cx="30" cy="16" rx="2" ry="4" fill="#FFFFFF" opacity="0.5"/>

  <!-- 汗滴装饰 -->
  <ellipse cx="16" cy="20" rx="4" ry="6" fill="#87CEEB" opacity="0.7"/>
  <ellipse cx="48" cy="24" rx="3" ry="5" fill="#87CEEB" opacity="0.7"/>
</svg>
