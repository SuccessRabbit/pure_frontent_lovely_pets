<!-- 算账小仓鼠 - 温暖萌宠风格 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- 背景 -->
  <rect width="200" height="280" fill="#FFFACD" rx="12"/>

  <!-- 金币装饰 -->
  <circle cx="40" cy="50" r="8" fill="#FFD700" opacity="0.7"/>
  <text x="40" y="54" font-family="Arial" font-size="10" fill="#8B7355" text-anchor="middle">¥</text>
  <circle cx="160" cy="55" r="7" fill="#FFD700" opacity="0.7"/>
  <text x="160" y="59" font-family="Arial" font-size="9" fill="#8B7355" text-anchor="middle">$</text>

  <!-- 仓鼠身体 -->
  <ellipse cx="100" cy="175" rx="55" ry="50" fill="#F4A460"/>

  <!-- 仓鼠头部 -->
  <circle cx="100" cy="120" r="45" fill="#F4A460"/>

  <!-- 白色肚子 -->
  <ellipse cx="100" cy="180" rx="38" ry="42" fill="#FFF8DC"/>

  <!-- 左耳 -->
  <circle cx="70" cy="90" r="12" fill="#D2691E"/>
  <circle cx="70" cy="90" r="8" fill="#FFB6C1"/>

  <!-- 右耳 -->
  <circle cx="130" cy="90" r="12" fill="#D2691E"/>
  <circle cx="130" cy="90" r="8" fill="#FFB6C1"/>

  <!-- 眼睛（精明的眼神） -->
  <circle cx="85" cy="115" r="9" fill="#2C1810"/>
  <circle cx="87" cy="113" r="3" fill="#FFFFFF"/>

  <circle cx="115" cy="115" r="9" fill="#2C1810"/>
  <circle cx="117" cy="113" r="3" fill="#FFFFFF"/>

  <!-- 眼镜 -->
  <circle cx="85" cy="115" r="13" fill="none" stroke="#8B7355" stroke-width="2"/>
  <circle cx="115" cy="115" r="13" fill="none" stroke="#8B7355" stroke-width="2"/>
  <line x1="98" y1="115" x2="102" y2="115" stroke="#8B7355" stroke-width="2"/>

  <!-- 鼻子 -->
  <ellipse cx="100" cy="128" rx="4" ry="3" fill="#D2691E"/>

  <!-- 嘴巴 -->
  <path d="M 90 135 Q 100 140 110 135" stroke="#2C1810" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 腮红 -->
  <ellipse cx="68" cy="125" rx="12" ry="8" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="132" cy="125" rx="12" ry="8" fill="#FFB6C1" opacity="0.6"/>

  <!-- 小短腿 -->
  <rect x="68" y="215" width="14" height="25" rx="7" fill="#F4A460"/>
  <rect x="118" y="215" width="14" height="25" rx="7" fill="#F4A460"/>

  <!-- 小爪子 -->
  <ellipse cx="75" cy="238" rx="9" ry="5" fill="#D2691E"/>
  <ellipse cx="125" cy="238" rx="9" ry="5" fill="#D2691E"/>

  <!-- 尾巴 -->
  <circle cx="145" cy="185" r="8" fill="#F4A460"/>

  <!-- 计算器装饰 -->
  <rect x="75" y="150" width="50" height="40" rx="3" fill="#2C3E50"/>
  <rect x="78" y="153" width="44" height="15" rx="1" fill="#34495E"/>
  <text x="100" y="164" font-family="monospace" font-size="10" fill="#00FF00" text-anchor="middle">888.88</text>

  <!-- 计算器按钮 -->
  <rect x="80" y="172" width="8" height="6" rx="1" fill="#7F8C8D"/>
  <rect x="90" y="172" width="8" height="6" rx="1" fill="#7F8C8D"/>
  <rect x="100" y="172" width="8" height="6" rx="1" fill="#7F8C8D"/>
  <rect x="110" y="172" width="8" height="6" rx="1" fill="#7F8C8D"/>
  <rect x="80" y="180" width="8" height="6" rx="1" fill="#7F8C8D"/>
  <rect x="90" y="180" width="8" height="6" rx="1" fill="#7F8C8D"/>
  <rect x="100" y="180" width="8" height="6" rx="1" fill="#7F8C8D"/>
  <rect x="110" y="180" width="8" height="6" rx="1" fill="#FFD700"/>

  <!-- 金币堆 -->
  <circle cx="150" cy="200" r="6" fill="#FFD700"/>
  <circle cx="145" cy="205" r="5" fill="#FFD700"/>
  <circle cx="155" cy="205" r="5" fill="#FFD700"/>
</svg>
