<!-- 资深社畜 - 角色插画（4:3比例） -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#F0F0F0"/>

  <!-- 装饰元素 -->
  <circle cx="70" cy="45" r="6" fill="#C0C0C0" opacity="0.5"/>
  <circle cx="330" cy="50" r="5" fill="#C0C0C0" opacity="0.5"/>

  <!-- 老马身体 -->
  <ellipse cx="200" cy="220" rx="82" ry="73" fill="#696969"/>

  <!-- 老马头部 -->
  <ellipse cx="200" cy="140" rx="65" ry="60" fill="#696969"/>

  <!-- 白色胸毛 -->
  <ellipse cx="200" cy="195" rx="52" ry="45" fill="#D3D3D3"/>

  <!-- 左耳 -->
  <ellipse cx="160" cy="105" rx="18" ry="32" fill="#505050" transform="rotate(-15 160 105)"/>

  <!-- 右耳 -->
  <ellipse cx="240" cy="105" rx="18" ry="32" fill="#505050" transform="rotate(15 240 105)"/>

  <!-- 眼睛（坚毅的眼神） -->
  <ellipse cx="175" cy="135" rx="15" ry="18" fill="#2C1810"/>
  <circle cx="178" cy="132" r="5" fill="#FFFFFF"/>

  <ellipse cx="225" cy="135" rx="15" ry="18" fill="#2C1810"/>
  <circle cx="228" cy="132" r="5" fill="#FFFFFF"/>

  <!-- 眼袋 -->
  <path d="M 163 148 Q 175 152 187 148" stroke="#505050" stroke-width="2.5" fill="none"/>
  <path d="M 213 148 Q 225 152 237 148" stroke="#505050" stroke-width="2.5" fill="none"/>

  <!-- 鼻子 -->
  <ellipse cx="200" cy="160" rx="10" ry="8" fill="#505050"/>

  <!-- 嘴巴（沉稳的表情） -->
  <path d="M 183 172 Q 200 175 217 172" stroke="#2C1810" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 胡须（老成） -->
  <line x1="130" y1="148" x2="158" y2="145" stroke="#505050" stroke-width="3"/>
  <line x1="130" y1="160" x2="158" y2="160" stroke="#505050" stroke-width="3"/>
  <line x1="242" y1="145" x2="270" y2="148" stroke="#505050" stroke-width="3"/>
  <line x1="242" y1="160" x2="270" y2="160" stroke="#505050" stroke-width="3"/>

  <!-- 眼镜装饰 -->
  <circle cx="175" cy="135" r="22" fill="none" stroke="#2C1810" stroke-width="3"/>
  <circle cx="225" cy="135" r="22" fill="none" stroke="#2C1810" stroke-width="3"/>
  <line x1="197" y1="135" x2="203" y2="135" stroke="#2C1810" stroke-width="3"/>

  <!-- 工牌 -->
  <rect x="168" y="185" width="64" height="36" rx="3" fill="#FFD700" stroke="#8B7355" stroke-width="2"/>
  <text x="200" y="207" font-family="Arial" font-size="14" fill="#8B7355" text-anchor="middle" font-weight="bold">10年</text>

  <!-- 勋章装饰 -->
  <circle cx="320" cy="100" r="18" fill="#FFD700" opacity="0.8"/>
  <text x="320" y="108" font-family="Arial" font-size="22" fill="#8B7355" text-anchor="middle">★</text>
</svg>
