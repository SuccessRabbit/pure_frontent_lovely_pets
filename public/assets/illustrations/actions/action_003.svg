<!-- 物理位移 - 图标插画（4:3比例） -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#E3F2FD"/>

  <!-- 网格背景 -->
  <line x1="100" y1="100" x2="300" y2="100" stroke="#90CAF9" stroke-width="2" opacity="0.3"/>
  <line x1="100" y1="150" x2="300" y2="150" stroke="#90CAF9" stroke-width="2" opacity="0.3"/>
  <line x1="100" y1="200" x2="300" y2="200" stroke="#90CAF9" stroke-width="2" opacity="0.3"/>
  <line x1="130" y1="70" x2="130" y2="230" stroke="#90CAF9" stroke-width="2" opacity="0.3"/>
  <line x1="200" y1="70" x2="200" y2="230" stroke="#90CAF9" stroke-width="2" opacity="0.3"/>
  <line x1="270" y1="70" x2="270" y2="230" stroke="#90CAF9" stroke-width="2" opacity="0.3"/>

  <!-- 位置A（起点） -->
  <rect x="105" y="125" width="50" height="50" rx="6" fill="#64B5F6" opacity="0.5"/>
  <circle cx="130" cy="150" r="16" fill="#2196F3"/>

  <!-- 位置B（终点） -->
  <rect x="245" y="175" width="50" height="50" rx="6" fill="#64B5F6" opacity="0.5"/>
  <circle cx="270" cy="200" r="16" fill="#2196F3"/>

  <!-- 交换箭头 -->
  <defs>
    <marker id="arrowhead2" markerWidth="15" markerHeight="15" refX="13" refY="4.5" orient="auto">
      <polygon points="0 0, 15 4.5, 0 9" fill="#FF6B9D"/>
    </marker>
  </defs>

  <path d="M 145 155 Q 207 165 255 190" stroke="#FF6B9D" stroke-width="6" fill="none" marker-end="url(#arrowhead2)"/>
  <path d="M 255 195 Q 193 185 145 160" stroke="#FF6B9D" stroke-width="6" fill="none" marker-end="url(#arrowhead2)"/>

  <!-- 运动轨迹 -->
  <circle cx="170" cy="160" r="5" fill="#FF6B9D" opacity="0.6"/>
  <circle cx="185" cy="165" r="4" fill="#FF6B9D" opacity="0.5"/>
  <circle cx="200" cy="170" r="4" fill="#FF6B9D" opacity="0.4"/>
  <circle cx="215" cy="175" r="4" fill="#FF6B9D" opacity="0.3"/>

  <circle cx="230" cy="190" r="5" fill="#FF6B9D" opacity="0.6"/>
  <circle cx="215" cy="185" r="4" fill="#FF6B9D" opacity="0.5"/>
  <circle cx="200" cy="180" r="4" fill="#FF6B9D" opacity="0.4"/>
  <circle cx="185" cy="175" r="4" fill="#FF6B9D" opacity="0.3"/>

  <!-- 标签 -->
  <text x="130" y="110" font-family="Arial" font-size="22" fill="#2196F3" text-anchor="middle" font-weight="bold">A</text>
  <text x="270" y="160" font-family="Arial" font-size="22" fill="#2196F3" text-anchor="middle" font-weight="bold">B</text>
</svg>
