<!-- 紧急避险 - 图标插画（4:3比例） -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#E8F5E9"/>

  <!-- 紧急出口门 -->
  <rect x="240" y="100" width="100" height="140" rx="8" fill="#4CAF50"/>
  <rect x="250" y="110" width="80" height="120" rx="6" fill="#81C784"/>

  <!-- 门把手 -->
  <circle cx="265" cy="170" r="6" fill="#2E7D32"/>

  <!-- 出口标志 -->
  <rect x="250" y="115" width="80" height="35" fill="#2E7D32"/>
  <text x="290" y="138" font-family="Arial" font-size="24" fill="#FFFFFF" text-anchor="middle" font-weight="bold">EXIT</text>

  <!-- 逃跑的小动物 -->
  <ellipse cx="150" cy="180" rx="35" ry="32" fill="#FF8C42"/>
  <ellipse cx="142" cy="175" rx="6" ry="8" fill="#2C1810"/>
  <ellipse cx="158" cy="175" rx="6" ry="8" fill="#2C1810"/>

  <!-- 惊恐的嘴巴 -->
  <ellipse cx="150" cy="188" rx="8" ry="10" fill="#2C1810"/>

  <!-- 耳朵 -->
  <ellipse cx="130" cy="160" rx="10" ry="20" fill="#FF6B35" transform="rotate(-20 130 160)"/>
  <ellipse cx="170" cy="160" rx="10" ry="20" fill="#FF6B35" transform="rotate(20 170 160)"/>

  <!-- 运动线条（表示快速移动） -->
  <line x1="80" y1="165" x2="110" y2="165" stroke="#90A4AE" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="70" y1="180" x2="105" y2="180" stroke="#90A4AE" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="85" y1="195" x2="115" y2="195" stroke="#90A4AE" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- 箭头指示 -->
  <defs>
    <marker id="arrowhead3" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#4CAF50"/>
    </marker>
  </defs>

  <path d="M 190 170 L 230 170" stroke="#4CAF50" stroke-width="8" fill="none" marker-end="url(#arrowhead3)"/>

  <!-- 警告标志 -->
  <circle cx="80" cy="100" r="35" fill="#FF5722" opacity="0.9"/>
  <text x="80" y="115" font-family="Arial" font-size="42" fill="#FFFFFF" text-anchor="middle" font-weight="bold">!</text>

  <!-- 闪电装饰（危险） -->
  <path d="M 320 60 L 310 85 L 320 85 L 310 110 L 335 80 L 325 80 Z" fill="#FFC107" opacity="0.8"/>

  <!-- 汗滴 -->
  <ellipse cx="165" cy="165" rx="4" ry="8" fill="#87CEEB" opacity="0.8"/>
  <ellipse cx="175" cy="168" rx="3" ry="6" fill="#87CEEB" opacity="0.8"/>
</svg>
