<!-- 高冷布偶 - 温暖萌宠风格 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- 背景 -->
  <rect width="200" height="280" fill="#F5F0FF" rx="12"/>

  <!-- 装饰元素 -->
  <circle cx="35" cy="40" r="4" fill="#E6D5FF" opacity="0.5"/>
  <circle cx="165" cy="35" r="5" fill="#E6D5FF" opacity="0.5"/>

  <!-- 布偶猫身体 -->
  <ellipse cx="100" cy="180" rx="52" ry="48" fill="#F5F5DC"/>

  <!-- 布偶猫头部 -->
  <ellipse cx="100" cy="115" rx="46" ry="42" fill="#F5F5DC"/>

  <!-- 深色面具（布偶特征） -->
  <path d="M 70 95 Q 100 110 130 95 Q 100 105 70 95" fill="#8B7355"/>

  <!-- 左耳 -->
  <path d="M 65 75 L 55 50 L 75 70 Z" fill="#F5F5DC"/>
  <path d="M 65 75 L 60 58 L 72 72 Z" fill="#8B7355"/>

  <!-- 右耳 -->
  <path d="M 135 75 L 145 50 L 125 70 Z" fill="#F5F5DC"/>
  <path d="M 135 75 L 140 58 L 128 72 Z" fill="#8B7355"/>

  <!-- 眼睛（蓝色，高冷） -->
  <ellipse cx="85" cy="108" rx="11" ry="13" fill="#4169E1"/>
  <ellipse cx="85" cy="108" rx="8" ry="10" fill="#6495ED"/>
  <circle cx="87" cy="106" r="3" fill="#FFFFFF"/>

  <ellipse cx="115" cy="108" rx="11" ry="13" fill="#4169E1"/>
  <ellipse cx="115" cy="108" rx="8" ry="10" fill="#6495ED"/>
  <circle cx="117" cy="106" r="3" fill="#FFFFFF"/>

  <!-- 鼻子 -->
  <path d="M 95 125 L 100 130 L 105 125 Z" fill="#D2B48C"/>

  <!-- 嘴巴（优雅的W形） -->
  <path d="M 88 133 Q 95 136 100 133 Q 105 136 112 133" stroke="#8B7355" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 胡须 -->
  <line x1="48" y1="115" x2="68" y2="113" stroke="#8B7355" stroke-width="1.5"/>
  <line x1="48" y1="122" x2="68" y2="122" stroke="#8B7355" stroke-width="1.5"/>
  <line x1="132" y1="113" x2="152" y2="115" stroke="#8B7355" stroke-width="1.5"/>
  <line x1="132" y1="122" x2="152" y2="122" stroke="#8B7355" stroke-width="1.5"/>

  <!-- 白色胸毛 -->
  <ellipse cx="100" cy="155" rx="30" ry="25" fill="#FFFFFF"/>

  <!-- 小短腿 -->
  <rect x="70" y="215" width="13" height="28" rx="6.5" fill="#F5F5DC"/>
  <rect x="117" y="215" width="13" height="28" rx="6.5" fill="#F5F5DC"/>

  <!-- 深色爪子 -->
  <ellipse cx="76.5" cy="241" rx="8" ry="5" fill="#8B7355"/>
  <ellipse cx="123.5" cy="241" rx="8" ry="5" fill="#8B7355"/>

  <!-- 尾巴（蓬松） -->
  <ellipse cx="145" cy="185" rx="18" ry="35" fill="#F5F5DC" transform="rotate(25 145 185)"/>
  <ellipse cx="150" cy="190" rx="12" ry="25" fill="#FFFFFF" transform="rotate(25 150 190)"/>

  <!-- 皇冠装饰（贵族） -->
  <g transform="translate(75, 45) scale(0.7)">
    <path d="M 10 15 L 15 5 L 20 15 L 25 5 L 30 15 L 35 5 L 40 15 L 40 20 L 10 20 Z" fill="#FFD700"/>
    <circle cx="15" cy="5" r="2" fill="#FF6B9D"/>
    <circle cx="25" cy="5" r="2" fill="#FF6B9D"/>
    <circle cx="35" cy="5" r="2" fill="#FF6B9D"/>
  </g>
</svg>
