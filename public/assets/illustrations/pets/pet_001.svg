<!-- 新晋柯基 - 角色插画（4:3比例） -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- 背景 -->
  <rect width="400" height="300" fill="#FFF4E6"/>

  <!-- 装饰圆点 -->
  <circle cx="60" cy="40" r="6" fill="#FFD4A3" opacity="0.5"/>
  <circle cx="340" cy="50" r="5" fill="#FFD4A3" opacity="0.5"/>

  <!-- 柯基身体 -->
  <ellipse cx="200" cy="220" rx="80" ry="70" fill="#F4A460"/>

  <!-- 白色胸毛 -->
  <path d="M 150 190 Q 200 220 250 190 Q 200 210 150 190" fill="#FFFFFF"/>

  <!-- 柯基头部 -->
  <ellipse cx="200" cy="140" rx="70" ry="65" fill="#F4A460"/>

  <!-- 左耳 -->
  <ellipse cx="150" cy="100" rx="28" ry="40" fill="#D2691E" transform="rotate(-20 150 100)"/>
  <ellipse cx="150" cy="100" rx="18" ry="28" fill="#F4A460" transform="rotate(-20 150 100)"/>

  <!-- 右耳 -->
  <ellipse cx="250" cy="100" rx="28" ry="40" fill="#D2691E" transform="rotate(20 250 100)"/>
  <ellipse cx="250" cy="100" rx="18" ry="28" fill="#F4A460" transform="rotate(20 250 100)"/>

  <!-- 左眼 -->
  <circle cx="175" cy="135" r="12" fill="#2C1810"/>
  <circle cx="178" cy="132" r="5" fill="#FFFFFF"/>

  <!-- 右眼 -->
  <circle cx="225" cy="135" r="12" fill="#2C1810"/>
  <circle cx="228" cy="132" r="5" fill="#FFFFFF"/>

  <!-- 鼻子 -->
  <ellipse cx="200" cy="155" rx="9" ry="7" fill="#2C1810"/>

  <!-- 嘴巴（微笑） -->
  <path d="M 185 165 Q 200 175 215 165" stroke="#2C1810" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 腮红 -->
  <ellipse cx="155" cy="150" rx="15" ry="10" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="245" cy="150" rx="15" ry="10" fill="#FFB6C1" opacity="0.6"/>

  <!-- 尾巴 -->
  <ellipse cx="270" cy="230" rx="22" ry="30" fill="#FFFFFF" transform="rotate(30 270 230)"/>

  <!-- 爱心装饰 -->
  <path d="M 320 80 C 320 72 328 65 337 65 C 346 65 354 72 354 80 C 354 95 320 115 320 115 C 320 115 286 95 286 80 C 286 72 294 65 303 65 C 312 65 320 72 320 80"
        fill="#FF6B9D" opacity="0.7" transform="scale(0.5) translate(480, 100)"/>
</svg>
