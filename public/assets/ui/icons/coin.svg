<!-- 金币图标 - 温暖萌宠风格 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 金币主体 -->
  <circle cx="32" cy="32" r="24" fill="#FFD700"/>

  <!-- 内圈 -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#FFA500" stroke-width="2"/>

  <!-- 货币符号 -->
  <text x="32" y="42" font-family="Arial" font-size="28" fill="#FFA500" text-anchor="middle" font-weight="bold">¥</text>

  <!-- 高光 -->
  <ellipse cx="24" cy="22" rx="8" ry="10" fill="#FFFFFF" opacity="0.4"/>

  <!-- 阴影 -->
  <circle cx="32" cy="34" r="24" fill="#000000" opacity="0.1"/>
</svg>
