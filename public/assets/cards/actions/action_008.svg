<!-- 紧急避险 - 温暖萌宠风格 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- 背景 -->
  <rect width="200" height="280" fill="#E8F5E9" rx="12"/>

  <!-- 出口标志背景 -->
  <rect x="50" y="100" width="100" height="80" rx="8" fill="#4CAF50"/>

  <!-- 出口箭头 -->
  <path d="M 100 120 L 130 150 L 115 150 L 115 170 L 85 170 L 85 150 L 70 150 Z" fill="#FFFFFF"/>

  <!-- 跑步的小动物 -->
  <g transform="translate(90, 190)">
    <!-- 身体 -->
    <ellipse cx="10" cy="10" rx="12" ry="10" fill="#FF8C42"/>
    <!-- 头 -->
    <circle cx="10" cy="3" r="8" fill="#FF8C42"/>
    <!-- 耳朵 -->
    <ellipse cx="6" cy="-2" rx="3" ry="5" fill="#D2691E"/>
    <ellipse cx="14" cy="-2" rx="3" ry="5" fill="#D2691E"/>
    <!-- 眼睛 -->
    <circle cx="8" cy="2" r="2" fill="#2C1810"/>
    <circle cx="12" cy="2" r="2" fill="#2C1810"/>
    <!-- 腿（跑步姿势） -->
    <line x1="5" y1="18" x2="2" y2="25" stroke="#FF8C42" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="18" x2="18" y2="25" stroke="#FF8C42" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- 运动线条 -->
  <line x1="70" y1="200" x2="85" y2="200" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="65" y1="210" x2="80" y2="210" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="60" y1="220" x2="75" y2="220" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- 警报灯 -->
  <circle cx="40" cy="120" r="10" fill="#FF6347" opacity="0.8"/>
  <circle cx="40" cy="120" r="15" fill="none" stroke="#FF6347" stroke-width="2" opacity="0.4"/>
  <circle cx="40" cy="120" r="20" fill="none" stroke="#FF6347" stroke-width="1" opacity="0.2"/>

  <circle cx="160" cy="120" r="10" fill="#FF6347" opacity="0.8"/>
  <circle cx="160" cy="120" r="15" fill="none" stroke="#FF6347" stroke-width="2" opacity="0.4"/>
  <circle cx="160" cy="120" r="20" fill="none" stroke="#FF6347" stroke-width="1" opacity="0.2"/>

  <!-- EXIT文字 -->
  <text x="100" y="155" font-family="Arial" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">EXIT</text>

  <!-- 标题 -->
  <text x="100" y="260" font-family="Arial" font-size="16" fill="#2E7D32" text-anchor="middle" font-weight="bold">紧急撤离</text>
</svg>
