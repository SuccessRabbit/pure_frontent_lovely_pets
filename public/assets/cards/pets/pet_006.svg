<!-- 永动机猫 - 温暖萌宠风格 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- 背景 -->
  <rect width="200" height="280" fill="#FFF9E6" rx="12"/>

  <!-- 能量波纹装饰 -->
  <circle cx="100" cy="140" r="80" stroke="#FFD700" stroke-width="2" fill="none" opacity="0.3"/>
  <circle cx="100" cy="140" r="65" stroke="#FFD700" stroke-width="2" fill="none" opacity="0.4"/>
  <circle cx="100" cy="140" r="50" stroke="#FFD700" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- 猫身体 -->
  <ellipse cx="100" cy="180" rx="50" ry="45" fill="#FFB347"/>

  <!-- 猫头部 -->
  <ellipse cx="100" cy="115" rx="44" ry="40" fill="#FFB347"/>

  <!-- 白色胸毛 -->
  <ellipse cx="100" cy="155" rx="28" ry="22" fill="#FFF8DC"/>

  <!-- 左耳 -->
  <path d="M 65 80 L 55 55 L 75 75 Z" fill="#FFB347"/>
  <path d="M 65 80 L 60 63 L 72 77 Z" fill="#FFA07A"/>

  <!-- 右耳 -->
  <path d="M 135 80 L 145 55 L 125 75 Z" fill="#FFB347"/>
  <path d="M 135 80 L 140 63 L 128 77 Z" fill="#FFA07A"/>

  <!-- 眼睛（炯炯有神） -->
  <ellipse cx="85" cy="110" rx="10" ry="12" fill="#2C1810"/>
  <ellipse cx="85" cy="110" rx="7" ry="9" fill="#FFD700"/>
  <circle cx="87" cy="108" r="3" fill="#FFFFFF"/>

  <ellipse cx="115" cy="110" rx="10" ry="12" fill="#2C1810"/>
  <ellipse cx="115" cy="110" rx="7" ry="9" fill="#FFD700"/>
  <circle cx="117" cy="108" r="3" fill="#FFFFFF"/>

  <!-- 鼻子 -->
  <path d="M 95 125 L 100 130 L 105 125 Z" fill="#FF6B9D"/>

  <!-- 嘴巴（自信的微笑） -->
  <path d="M 88 133 Q 95 138 100 133 Q 105 138 112 133" stroke="#2C1810" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 胡须 -->
  <line x1="50" y1="118" x2="70" y2="115" stroke="#2C1810" stroke-width="1.5"/>
  <line x1="50" y1="125" x2="70" y2="125" stroke="#2C1810" stroke-width="1.5"/>
  <line x1="130" y1="115" x2="150" y2="118" stroke="#2C1810" stroke-width="1.5"/>
  <line x1="130" y1="125" x2="150" y2="125" stroke="#2C1810" stroke-width="1.5"/>

  <!-- 小短腿 -->
  <rect x="70" y="215" width="13" height="28" rx="6.5" fill="#FFB347"/>
  <rect x="117" y="215" width="13" height="28" rx="6.5" fill="#FFB347"/>

  <!-- 白色爪子 -->
  <ellipse cx="76.5" cy="241" rx="8" ry="5" fill="#FFF8DC"/>
  <ellipse cx="123.5" cy="241" rx="8" ry="5" fill="#FFF8DC"/>

  <!-- 尾巴（向上翘） -->
  <path d="M 140 175 Q 160 160 165 140 Q 163 150 155 155" fill="#FFB347" stroke="#FFA07A" stroke-width="2"/>

  <!-- 齿轮装饰（永动机） -->
  <g transform="translate(145, 100) scale(0.6)">
    <circle cx="20" cy="20" r="15" fill="none" stroke="#8B7355" stroke-width="2"/>
    <circle cx="20" cy="20" r="5" fill="#8B7355"/>
    <rect x="18" y="5" width="4" height="10" fill="#8B7355"/>
    <rect x="18" y="25" width="4" height="10" fill="#8B7355"/>
    <rect x="5" y="18" width="10" height="4" fill="#8B7355"/>
    <rect x="25" y="18" width="10" height="4" fill="#8B7355"/>
  </g>

  <!-- 能量符号 -->
  <path d="M 35 60 L 30 75 L 37 75 L 32 90 L 45 72 L 38 72 Z" fill="#FFD700" opacity="0.8"/>
  <path d="M 165 65 L 160 80 L 167 80 L 162 95 L 175 77 L 168 77 Z" fill="#FFD700" opacity="0.8"/>
</svg>
